<!-- ── Chat Section ────────────────────────────── -->
<div class="chat-section">
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-dot"></div>
            <span>VOID Online</span>
            <span class="chat-hint">Try: "recommend mystery books" or "I want sci-fi"</span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Ask VOID anything… (Enter to send)" autocomplete="off">
            <button id="chat-send">Send</button>
        </div>
    </div>
</div>
